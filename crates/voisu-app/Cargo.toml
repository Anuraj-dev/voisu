[package]
name = "voisu-app"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[[bin]]
name = "voisu"
path = "src/bin/voisu.rs"

[[bin]]
name = "voisu-daemon"
path = "src/bin/voisu-daemon.rs"

[dependencies]
libc = "0.2"
serde_json = "1"
tokio = { version = "1", features = ["io-util", "macros", "net", "rt-multi-thread", "signal", "sync", "time"] }
voisu-core = { path = "../voisu-core" }

[dev-dependencies]
tempfile = "3"
